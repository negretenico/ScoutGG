services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scoutgg
      POSTGRES_USER: scoutgg
      POSTGRES_PASSWORD: scoutgg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI

volumes:
  postgres_data:
