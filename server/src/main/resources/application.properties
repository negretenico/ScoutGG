spring.application.name=server
server.port=8082

# Postgres (read-only queries — same shared DB)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/scoutgg
spring.datasource.username=${DB_USER:scoutgg}
spring.datasource.password=${DB_PASSWORD:scoutgg}
spring.jpa.hibernate.ddl-auto=validate

# CORS — allow frontend dev server
scout.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
