spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/scoutgg
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

riot:
  poll:
    interval-ms: 3600000  # 60 minutes — reduced load for dev environment

admin:
  api-key: ${ADMIN_KEY}
