spring.application.name=riot-api
server.port=8080

# Postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/scoutgg
spring.datasource.username=${DB_USER:scoutgg}
spring.datasource.password=${DB_PASSWORD:scoutgg}
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Riot API
riot.api.key=${RIOT_API_KEY}
riot.api.base-url=https://esports-api.lolesports.com/persisted/gw
