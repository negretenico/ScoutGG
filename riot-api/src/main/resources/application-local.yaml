spring:
  datasource:
    url: jdbc:h2:mem:scoutgg;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

admin:
  api-key: dev-admin-key
