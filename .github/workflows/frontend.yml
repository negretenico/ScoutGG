name: Frontend CI

on:
  push:
    branches: [develop, main]
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: make setup-frontend

      - name: Test
        run: make test-frontend

      - name: Build static export
        if: github.event_name == 'push'
        env:
          NEXT_PUBLIC_STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: ${{ github.ref == 'refs/heads/main' && '/ScoutGG/prod' || '/ScoutGG/dev' }}
          NEXT_PUBLIC_USE_MOCKS: ${{ github.ref == 'refs/heads/main' && 'false' || 'true' }}
          NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.DEV_API_URL }}
        run: make build-frontend

      - name: Deploy to GitHub Pages (dev)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          destination_dir: dev
          keep_files: true

      - name: Deploy to GitHub Pages (prod)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          destination_dir: prod
          keep_files: true
