name: Riot API CI

on:
  push:
    paths:
      - 'riot-api/**'
  pull_request:
    paths:
      - 'riot-api/**'

jobs:
  build:
    uses: negretenico/GithubWorkflows/.github/workflows/java_maven_build.yaml@main
    with:
      working_directory: riot-api
      artifact_name: riot-api-jar
    secrets: inherit

  docker:
    needs: build
    uses: negretenico/GithubWorkflows/.github/workflows/docker_build.yaml@main
    with:
      working_directory: riot-api
      service_name: riot-api
      artifact_name: riot-api-jar
    secrets: inherit
