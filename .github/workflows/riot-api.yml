name: Riot API CI

on:
  push:
    branches: [develop, main]
    paths: ['riot-api/**']
  pull_request:
    paths: ['riot-api/**']

jobs:
  build:
    uses: negretenico/GithubWorkflows/.github/workflows/java_maven_build.yaml@main
    permissions:
      contents: read
      packages: write
    with:
      working_directory: riot-api
      artifact_name: riot-api-jar
    secrets: inherit

  version:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_suffix: ${{ steps.resolve.outputs.version_suffix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Resolve and tag version
        id: resolve
        run: |
          LATEST=$(git tag -l "riot-api/v*.*.*" | sort -V | tail -n1)
          BASE="${LATEST:-riot-api/v0.0.0}"; BASE="${BASE#riot-api/}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE#v}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            git tag "riot-api/${NEXT}"
            git push origin "riot-api/${NEXT}"
            echo "version_suffix=${NEXT}" >> "$GITHUB_OUTPUT"
          else
            echo "version_suffix=${BASE}-SNAPSHOT-${SHA}" >> "$GITHUB_OUTPUT"
          fi

  docker-dev:
    needs: version
    if: github.ref == 'refs/heads/develop'
    environment: dev
    uses: negretenico/GithubWorkflows/.github/workflows/docker_build.yaml@main
    permissions:
      contents: read
      packages: write
    with:
      working_directory: riot-api
      service_name: riot-api
      artifact_name: riot-api-jar
      version_suffix: ${{ needs.version.outputs.version_suffix }}
    secrets: inherit

  docker-prod:
    needs: version
    if: github.ref == 'refs/heads/main'
    environment: production
    uses: negretenico/GithubWorkflows/.github/workflows/docker_build.yaml@main
    permissions:
      contents: read
      packages: write
    with:
      working_directory: riot-api
      service_name: riot-api
      artifact_name: riot-api-jar
      version_suffix: ${{ needs.version.outputs.version_suffix }}
    secrets: inherit
