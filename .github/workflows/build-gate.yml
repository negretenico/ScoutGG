name: Build Gate

on:
  pull_request:
  workflow_run:
    workflows:
      - Riot API CI
      - Server CI
      - AI CI
      - Broadcast CI
      - Frontend CI
    types: [completed]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      - name: Gate
        uses: actions/github-script@v7
        with:
          script: |
            const MODULE_CIS = ['Riot API CI', 'Server CI', 'AI CI', 'Broadcast CI', 'Frontend CI']
            const MODULE_PATHS = /^(frontend|riot-api|server|ai|broadcast)\//

            if (context.eventName === 'pull_request') {
              const { execSync } = require('child_process')
              const base = context.payload.pull_request.base.ref
              const changed = execSync(`git diff --name-only origin/${base}...HEAD`).toString()

              if (!MODULE_PATHS.test(changed)) {
                console.log('No module files changed — gate passes')
                return
              }
            }

            // On workflow_run, trust the event payload for the triggering CI — don't re-query it
            // to avoid API eventual-consistency race conditions.
            if (context.eventName === 'workflow_run') {
              const { conclusion, name, head_sha: sha } = context.payload.workflow_run

              if (conclusion === 'failure' || conclusion === 'cancelled') {
                core.setFailed(`${name} ${conclusion}`)
                return
              }

              // Check if any OTHER module CIs ran on this SHA and are pending/failed
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              })

              const others = data.workflow_runs.filter(r => MODULE_CIS.includes(r.name) && r.name !== name)
              const failed = others.filter(r => r.status === 'completed' && (r.conclusion === 'failure' || r.conclusion === 'cancelled'))
              const pending = others.filter(r => r.status !== 'completed')

              if (failed.length > 0) {
                core.setFailed(`Failed: ${failed.map(r => r.name).join(', ')}`)
              } else if (pending.length > 0) {
                core.setFailed(`Still running: ${pending.map(r => r.name).join(', ')}`)
              } else {
                console.log(`All passed`)
              }
              return
            }

            // pull_request path: query all module CIs for this SHA
            const sha = context.payload.pull_request.head.sha
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              per_page: 100,
            })

            const relevant = data.workflow_runs.filter(r => MODULE_CIS.includes(r.name))

            if (relevant.length === 0) {
              core.setFailed('Module files changed but no module CIs have started yet')
              return
            }

            const failed = relevant.filter(r =>
              r.status === 'completed' && (r.conclusion === 'failure' || r.conclusion === 'cancelled')
            )
            const pending = relevant.filter(r => r.status !== 'completed')

            if (failed.length > 0) {
              core.setFailed(`Failed: ${failed.map(r => r.name).join(', ')}`)
            } else if (pending.length > 0) {
              core.setFailed(`Still running: ${pending.map(r => r.name).join(', ')}`)
            } else {
              console.log(`All passed: ${relevant.map(r => r.name).join(', ')}`)
            }
